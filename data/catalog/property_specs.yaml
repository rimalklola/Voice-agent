        value: Chaque villa bénéficie d’une vue mer panoramique embrassant toute la
          baie de Tanger offrant un spectacle naturel unique à toute heure de la journée.
      parking_garage:
        label: Parking/Garage
        value: la villa dispose d'un très grand parking au sous sol pouvant acueillir
          4 voitures, il dispose également de 2 chambres pour le personnel et 3 locaux
          techniques et boxes
      finishes:
        label: Finitions
        value: Bois massif, marbre italien, pierre blonde, cuisine équipée et finitions
