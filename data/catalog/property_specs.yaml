          ils vous donneront plus de détail, souhaitez être contacter par un commercial
      detached_or_semi:
        label: Implantation
        value: Les villas sont isolées offrant ainsi à chaque résident une intimité
          préservée, un confort acoustique optimal et une atmosphère paisible au cœur
          d’un cadre naturel raffiné.
      customization:
        label: Personnalisation
        value: Le design des villas a été conçu par des architectes renommés, dotés
