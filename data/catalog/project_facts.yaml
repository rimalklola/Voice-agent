      • piocher les informations de la brochure, parler du club Alma et ses activités,
      parler aussi de la zone récréative qui fait 3 ha avec nature conservée et accés
      à la mer aménagé

      • le projet dispose d''un accés direct à la mer, un aménagement sera réalisé
      en plage artificielle, ponton plongeoire, un chiringuito pour la détente et
      profiter de la vue exceptionnelle'
