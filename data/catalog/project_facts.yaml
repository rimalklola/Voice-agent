  entries:
  - id: developers
    label: Développeur & opérateur
    aliases: []
    text: • Le projet est développé est géré par le groupement A.Lazrak immobilier,
      Standard LYS et Urbat Maroc, spécialistes de développement de projet au Maroc
      avec beaucoup de références nationales, exemple projet Costamar à Martil, Cléblanche
      à Rabat Souissi, les Zenith à Casablanca et bien d'autres
- id: site_life
  label: Vie & Sécurité
  aliases:
  - sécurité
  - vie
  entries:
  - id: security_nature
    label: Sécurité & Nature
    aliases: []
    text: "Alma Resort est une résidence entièrement fermée et sécurisée, accessible\
      \ uniquement aux acquéreurs et aux clients de l'hôtel Soho Boutique. Un poste\
      \ de contrôle d'accès est installé à l'entrée du site avec gardiennage permanent.\
      \ La résidence intègre une zone récréative de 3 hectares de nature préservée\
      \ avec accès direct et exclusif à la mer : plage aménagée, ponton plongeoir,\
      \ chiringuito, crique privée réservée aux résidents. L'Alma Club, le spa, les\
      \ restaurants et les jardins paysagers complètent cette offre de vie premium\
      \ dans un cadre sécurisé et confidentiel."
- id: amenities
  label: Services & Équipements
  aliases:
  - services
  - équipements
  - loisirs
  - club
  entries:
  - id: amenities_overview
    label: Équipements de loisirs
    aliases:
    - équipements
    - loisirs
    - services
    text: "Alma Resort offre une expérience de vie unique grâce à ses équipements de\
      \ prestige : Alma Club avec piscine couverte chauffée, spa haut de gamme, hammam,\
      \ salle de fitness, courts de padel, aire de jeux pour enfants et amphithéâtre\
      \ végétal en plein air. Les résidents profitent également d'un chiringuito en\
      \ bord de mer, d'une plage aménagée avec ponton et plongeoir, d'une crique exclusive\
      \ réservée aux résidents, et de restaurants face mer avec vue panoramique sur\
      \ la baie de Tanger. L'hôtel 5★ Soho Boutique (54 chambres dont 4 suites) propose\
      \ son restaurant panoramique, son bar et sa piscine à débordement aux résidents.\
      \ L'ensemble est intégré dans un cadre paysagé de 3 hectares préservés avec\
      \ allées piétonnes arborées, pins parasols, caroubiers et chênes verts."
  - id: alma_club
    label: Alma Club
    aliases:
    - alma club
    - club
    - piscine
    - spa
    - fitness
    - padel
    text: "L'Alma Club est le cœur de loisirs de la résidence : piscine couverte chauffée,\
      \ spa avec soins haut de gamme, hammam traditionnel, salle de fitness équipée,\
      \ courts de padel, aire de jeux sécurisée pour enfants et amphithéâtre végétal\
      \ pour événements en plein air. Accès inclus pour tous les résidents."
  - id: beach_sea
    label: Plage et crique
    aliases:
    - plage
    - mer
    - crique
    - chiringuito
    - baignade
    text: "Accès direct et exclusif à la mer avec une crique aménagée réservée aux\
      \ résidents. La zone balnéaire comprend une plage artificielle, un ponton plongeoir,\
      \ un chiringuito pour la détente et la restauration légère, le tout avec une\
      \ vue exceptionnelle sur la baie de Tanger. Zone récréative de 3 hectares avec\
      \ nature conservée et cheminements piétons vers la mer."
  - id: hotel_soho
    label: Hôtel Soho Boutique
    aliases:
    - soho
    - hôtel
    - hotel
    - restaurant
    - bar
    text: "L'hôtel 5★ Soho Boutique Hotels compte 54 chambres dont 4 suites. Les résidents\
      \ peuvent profiter du restaurant panoramique avec terrasse sur la baie, du bar\
      \ lounge, de la piscine à débordement de l'hôtel et de l'ensemble des services\
      \ hôteliers premium. Le bureau de vente est ouvert du lundi au samedi de 10h à 18h."
