  entries:
  - id: how_to_get_there
    label: Comment s'y rendre
    aliases: []
    text: "• le projet est situé à Tanger dans le quartier Cap Malabata, mitoyen au\
      \ Mnar et à l'aquaparc\nEn face du restaurant Casitillo \nIl est à 7 mn de la\
      \ gare de Tanger \nsur la route nationale N16\nhttps://maps.app.goo.gl/gVyu6NH7m5J1WAKE9\n\
      • dépasser la zone ghandouri et prendre la route nationale N16, à environ 3\
      \ km, vous verrez l'aquapark, juste après il y a un rond point, il faudra tourner\
      \ à gauche, vous trouverez la signalétique du projet qui mène jusqu'au bureau\
      \ de vente"
- id: permits_status
