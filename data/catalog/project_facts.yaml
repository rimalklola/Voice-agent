metadata:
  disclaimer: Informations officielles Alma Resort à confirmer auprès de l'équipe
    commerciale en cas de doute.
sections:
- id: location
  label: Localisation et accès
  aliases:
  - localisation
  - adresse
  - emplacement
  - accès
  - access
  entries:
  - id: exact_location
    label: Localisation exacte
    aliases:
    - adresse
    - localisation
    - emplacement
    - où
    - situe
    text: 'Alma Resort se situe à Tanger, quartier Cap Malabata, à côté de Mnar Park
      et de l''aquaparc. L''entrée principale fait face au restaurant Casitillo, à
      environ 7 minutes de la gare LGV Tanger et le long de la route nationale N16.
      Localisation Maps: https://maps.app.goo.gl/gVyu6NH7m5J1WAKE9.

      '
  - id: road_directions
    label: Itinéraire routier
    aliases:
    - accès
    - directions
    - route
    text: 'Depuis la corniche, dépassez Ghandouri puis prenez la N16 direction Cap
      Malabata. Après environ 3 km, l''aquaparc apparaît; tournez à gauche au rond-point
      et suivez la signalétique Alma Resort jusqu''au bureau de vente.

      '
  - id: transport_links
    label: Connexions nationales
    aliases:
    - connexions
    - transport
    - lgv
    - port
    text: 'La destination profite de la LGV Tanger–Casablanca (2 h+), d''une future
      extension vers Marrakech, des ports Tanger Ville↔Tarifa et Tanger Med↔Algeciras,
      ainsi que de l''aéroport de Tanger pour les liaisons Europe. Autoroutes vers
      Rabat, Casablanca, Marrakech et Agadir accessibles rapidement.

      '
- id: project_overview
  label: Projet & développement
  aliases:
  - projet
  - description
  - composition
  entries:
  - id: description
    label: Description du projet
    aliases:
    - description
    - resume
    text: 'Alma Resort est un domaine face mer regroupant un hôtel 5*, des appartements
      RIPT meublés, des résidences privées, des villas premium et 93 lots à bâtir.
      L''offre associe prestations hôtelières Soho Boutique, Alma Club, plage aménagée
      et services premium.

      '
  - id: composition
    label: Consistance
    aliases:
    - consistance
    - composition
    - programme
    text: 'Le programme comprend quatre familles: appartements RIPT gérés, résidences
      privées libres, villas isolées (Type 1 à 3) et lots en bande ou jumelés. Chaque
      typologie bénéficie d''un parking titré et d''un accès direct aux espaces loisirs
      (club, plage, chiringuito).

      '
  - id: developers
    label: Promoteurs & partenaires
    aliases:
    - promoteurs
    - partenaires
    - investisseurs
    text: 'Le projet est porté par A. Lazrak Immobilier, Standard LYS et Urbat Maroc,
      développeurs marocains référents (Costamar Martil, Cléblanche Rabat Souissi,
      Les Zénith Casablanca…).

      '
  - id: architects
    label: Architectes
    aliases:
    - architectes
    - conception
    text: 'Les architectes Jawad Mesmoudi et Younes Diouri signent la conception,
      avec des références reconnues à l''échelle nationale.

      '
  - id: hotel_operator
    label: Gestion hôtelière
    aliases:
    - gestionnaire
    - soho
    - hotel
    text: 'L''exploitation hôtelière est assurée par Soho Boutique Hotels (54 chambres
      dont 4 suites). Les résidents profitent du restaurant panoramique, bar, piscine
      à débordement, spa, fitness et services 5*.

      '
  - id: progress
    label: Avancement & livraisons
    aliases:
    - avancement
    - livraison
    - chantier
    text: "Les travaux avancent à cadence soutenue. Le lotissement (93 lots) a été\
      \ livré avec titres fonciers en décembre 2025 — les lots sont désormais disponibles\
      \ immédiatement. L'hôtel 5★ Soho Boutique, les appartements RIPT, les résidences\
      \ privées et les villas premium sont en cours de construction et seront livrés\
      \ en septembre 2027. Un appartement témoin est prévu pour l'été 2026."
- id: legal
  label: Cadre légal & gouvernance
  aliases:
  - legal
  - juridique
  - autorisations
  entries:
  - id: construction_permit
    label: Autorisation de construire
    aliases:
    - autorisation construire
    - permis
    text: 'Le projet dispose de l''ensemble des autorisations de construire nécessaires.

      '
  - id: lotting_permit
    label: Autorisation de lotir
    aliases:
    - autorisation lotir
    text: 'Le lotissement est officiellement autorisé, permettant la commercialisation
      des lots.

      '
  - id: security_rules
    label: Sécurité & contrôle
    aliases:
    - sécurité
    - controle accès
    text: 'Résidence fermée et sécurisée réservée aux acquéreurs et clients de l''hôtel,
      avec contrôle d''accès dédié installé à l''entrée du site.

      '
  - id: copro_rules
    label: Règlement de copropriété
    aliases:
    - reglement
    - copropriété
    text: 'Un règlement intérieur détaillé encadre la gestion durable: collecte des
      déchets, validation des plans par le conseil syndical avant permis, obligation
      de quitus du syndic avant travaux ou cession.

      '
  - id: syndic_fees
    label: Frais de syndic
    aliases:
    - frais syndic
    - budget fonctionnement
    text: 'Le budget de fonctionnement n''est pas encore arrêté; une société de gestion
      privée soumettra annuellement le budget aux copropriétaires pour vote.

      '
  - id: price_declaration
    label: Déclaration des prix
    aliases:
    - prix déclarés
    text: 'Les prix sont 100 % déclarés dans les actes officiels.

      '
- id: lifestyle
  label: Vie sur site
  aliases:
  - services
  - loisirs
  - nature
  entries:
  - id: amenities
    label: Services & loisirs
    aliases:
    - services
    - équipements
    - loisirs
    text: 'Alma Club propose piscine couverte, spa, hammam, fitness, restaurants face
      mer, padel, aire enfants et amphithéâtre végétal. Un chiringuito et la plage
      aménagée complètent l''expérience.

      '
  - id: green_spaces
    label: Espaces verts
    aliases:
    - espaces verts
    - nature
    text: 'Le projet intègre 3 hectares d''espaces paysagers conservés, cheminements
      piétons et jardins partagés (pins parasols, caroubiers, chênes verts) reliant
      les résidences à la mer.

      '
  - id: sea_access
    label: Accès mer & zone récréative
    aliases:
    - accès mer
    - plage
    text: 'Accès direct à la mer avec plage aménagée, ponton plongeoir et équipements
      balnéaires réservés aux résidents.

      '
