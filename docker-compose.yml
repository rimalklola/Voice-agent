version: '3.9'

services:
  voice-agent:
    build: .
    container_name: alma-voice-agent
    env_file:
      - .env
    environment:
      ALMA_CONFIG_FILE: ${ALMA_CONFIG_FILE:-/app/config/settings.yaml}
    ports:
      - "3001:3001"           # HTTP / Twilio WebSocket
      - "5060:5060/udp"       # SIP signalling (MicroSIP / any SIP client)
      - "10000-20000:10000-20000/udp"  # RTP media
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    restart: unless-stopped
