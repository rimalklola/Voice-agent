version: '3.9'

services:
  voice-agent:
    build: .
    container_name: alma-voice-agent
    env_file:
      - .env
    environment:
      ALMA_CONFIG_FILE: ${ALMA_CONFIG_FILE:-/app/config/settings.yaml}
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    command: uvicorn src.utils.realtime:create_app --factory --host 0.0.0.0 --port 3000
